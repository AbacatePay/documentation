openapi: 3.1.0
info:
  title: API AbacatePay
  description: API para gerenciamento de cobranças e pagamentos usando o AbacatePay.
  version: 1.0.0
servers:
  - url: 'https://api.abacatepay.com/v2'
    description: Único servidor para os ambientes de produção e sandbox.
paths:
  /customers/create:
    post:
      summary: Criar um cliente
      description: >
        Permite que você crie um cliente para a sua loja.


        **Campo obrigatório**: Apenas o `email` é obrigatório para criar um
        cliente.


        **Recomendado**: Embora os demais campos sejam opcionais, é altamente
        recomendado fornecer `name`, `cellphone`, `taxId` e `zipCode` quando
        disponíveis, pois essas informações melhoram a experiência do cliente no
        checkout e facilitam a identificação.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >
                Os dados do seu cliente.


                **Obrigatório**: Apenas `email` é obrigatório.


                **Opcional mas recomendado**: `name`, `cellphone`, `taxId`,
                `zipCode` e `metadata` são opcionais, mas recomendados para
                melhor experiência do cliente.
              required:
                - email
              additionalProperties: false
              example:
                email: daniel_lima@abacatepay.com
              properties:
                email:
                  type: string
                  description: E-mail do cliente (obrigatório)
                  example: daniel_lima@abacatepay.com
                name:
                  type: string
                  description: Nome completo do seu cliente (opcional)
                  example: Daniel Lima
                  x-mint:
                    hidden: true
                cellphone:
                  type: string
                  description: Celular do cliente (opcional)
                  example: (11) 4002-8922
                  x-mint:
                    hidden: true
                taxId:
                  type: string
                  description: CPF ou CNPJ válido do cliente (opcional)
                  example: 123.456.789-01
                  x-mint:
                    hidden: true
                zipCode:
                  type: string
                  description: CEP do cliente (opcional)
                  example: 01310-100
                  x-mint:
                    hidden: true
                metadata:
                  type: object
                  description: >-
                    Metadados adicionais do cliente. Campo livre para a sua
                    aplicação (opcional)
                  additionalProperties: true
                  example:
                    source: landing-page
                    campaign: black-friday-2025
                  x-mint:
                    hidden: true
      responses:
        '200':
          description: Cliente criado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Customer'
                  error:
                    type: string
                    nullable: true
                    example: null
                  success:
                    $ref: '#/components/schemas/Success'
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: >-
                      Mensagem de erro descrevendo o motivo da falha na
                      autenticação.
                    example: Token de autenticação inválido ou ausente.
  /customers/list:
    get:
      summary: Listar clientes
      description: >
        Retorna todos os clientes que você cadastrou com suporte a paginação.


        Você pode usar essa rota para visualizar todos os seus clientes e suas
        informações.


        **Alternativa**: Você também pode visualizar e gerenciar seus clientes
        pelo [Dashboard da AbacatePay](https://app.abacatepay.com/clientes).
      security:
        - bearerAuth: []
      parameters:
        - name: after
          in: query
          description: Cursor para buscar itens após este ponto
          required: false
          schema:
            type: string
        - name: before
          in: query
          description: Cursor para buscar itens antes deste ponto
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Quantidade de itens por página (1-100)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
            example: 100
        - name: id
          in: query
          description: Filtrar por identificador único do cliente
          required: false
          schema:
            type: string
            example: cust_aebxkhDZNaMmJeKsy0AHS0FQ
        - name: email
          in: query
          description: Filtrar por e-mail do cliente
          required: false
          schema:
            type: string
            example: daniel_lima@abacatepay.com
        - name: taxId
          in: query
          description: Filtrar por CPF ou CNPJ do cliente
          required: false
          schema:
            type: string
            example: 123.456.789-01
      responses:
        '200':
          description: Lista de clientes retornada com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: Lista de clientes.
                    items:
                      $ref: '#/components/schemas/Customer'
                  success:
                    $ref: '#/components/schemas/Success'
                  error:
                    type: string
                    example: null
                    nullable: true
                  pagination:
                    $ref: '#/components/schemas/PaginationCursor'
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: >-
                      Mensagem de erro descrevendo o motivo da falha na
                      autenticação.
                    example: Token de autenticação inválido ou ausente.
  /customers/get:
    get:
      summary: Buscar um cliente
      description: >
        Retorna os dados de um cliente específico baseado em filtros.


        Você pode usar essa rota para buscar um cliente por ID ou outros
        critérios.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          description: Identificador único público do cliente
          required: false
          schema:
            type: string
            example: cust_aebxkhDZNaMmJeKsy0AHS0FQ
      responses:
        '200':
          description: Cliente encontrado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Customer'
                  error:
                    type: string
                    example: null
                    nullable: true
                  success:
                    $ref: '#/components/schemas/Success'
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: >-
                      Mensagem de erro descrevendo o motivo da falha na
                      autenticação.
                    example: Token de autenticação inválido ou ausente.
        '404':
          description: Cliente não encontrado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: >-
                      Mensagem de erro indicando que o cliente não foi
                      encontrado.
                    example: Cliente não encontrado.
  /customers/delete:
    post:
      summary: Deletar um cliente
      description: |
        Remove um cliente da sua loja.

        Esta operação é irreversível. Use com cuidado.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          description: Identificador único público do cliente a ser deletado
          schema:
            type: string
            example: cust_aebxkhDZNaMmJeKsy0AHS0FQ
      responses:
        '200':
          description: Cliente deletado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Customer'
                  error:
                    type: string
                    example: null
                    nullable: true
                  success:
                    $ref: '#/components/schemas/Success'
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: >-
                      Mensagem de erro descrevendo o motivo da falha na
                      autenticação.
                    example: Token de autenticação inválido ou ausente.
        '404':
          description: Cliente não encontrado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: >-
                      Mensagem de erro indicando que o cliente não foi
                      encontrado.
                    example: Cliente não encontrado.
  /coupons/create:
    post:
      summary: Criar um cupom
      description: >
        Permite que você crie um novo cupom que pode ser usado por seus clientes
        para aplicar descontos.


        **Alternativa**: Você também pode criar e gerenciar seus cupons pelo
        [Dashboard da AbacatePay](https://app.abacatepay.com/cupons).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Coupon'
      responses:
        '200':
          description: Cupom criado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CouponResponse'
                  error:
                    type: string
                    nullable: true
                    example: null
                  success:
                    $ref: '#/components/schemas/Success'
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: >-
                      Mensagem de erro descrevendo o motivo da falha na
                      autenticação.
                    example: Token de autenticação inválido ou ausente.
  /coupons/list:
    get:
      summary: Listar cupons
      description: >
        Retorna todos os cupons que você criou com suporte a paginação.


        Você pode usar essa rota para visualizar todos os seus cupons, incluindo
        seus status (ativos, inativos ou expirados), descontos aplicados e
        quantas vezes foram utilizados.


        **Alternativa**: Você também pode visualizar e gerenciar seus cupons
        pelo [Dashboard da AbacatePay](https://app.abacatepay.com/cupons).
      security:
        - bearerAuth: []
      parameters:
        - name: after
          in: query
          description: Cursor para buscar itens após este ponto
          required: false
          schema:
            type: string
        - name: before
          in: query
          description: Cursor para buscar itens antes deste ponto
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Quantidade de itens por página (1-100)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
            example: 100
        - name: id
          in: query
          description: Filtrar por identificador único do cupom
          required: false
          schema:
            type: string
            example: DEYVIN_20
        - name: status
          in: query
          description: Filtrar por status do cupom
          required: false
          schema:
            type: string
            enum:
              - ACTIVE
              - INACTIVE
              - EXPIRED
      responses:
        '200':
          description: Lista de cupons retornada com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: Lista de cupons.
                    items:
                      $ref: '#/components/schemas/CouponResponse'
                  success:
                    $ref: '#/components/schemas/Success'
                  error:
                    type: string
                    nullable: true
                    example: null
                  pagination:
                    $ref: '#/components/schemas/PaginationCursor'
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: >-
                      Mensagem de erro descrevendo o motivo da falha na
                      autenticação.
                    example: Token de autenticação inválido ou ausente.
  /coupons/get:
    get:
      summary: Buscar um cupom
      description: >
        Retorna os dados de um cupom específico baseado em filtros.


        Você pode usar essa rota para buscar um cupom por ID ou outros
        critérios.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          description: Identificador único do cupom
          required: false
          schema:
            type: string
            example: MY_COUPON
      responses:
        '200':
          description: Cupom encontrado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CouponResponse'
                  error:
                    type: string
                    nullable: true
                    example: null
                  success:
                    $ref: '#/components/schemas/Success'
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: >-
                      Mensagem de erro descrevendo o motivo da falha na
                      autenticação.
                    example: Token de autenticação inválido ou ausente.
        '404':
          description: Cupom não encontrado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro indicando que o cupom não foi encontrado.
                    example: Cupom não encontrado.
  /coupons/delete:
    post:
      summary: Deletar um cupom
      description: |
        Remove um cupom da sua loja.

        Esta operação é irreversível. Use com cuidado.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          description: Identificador único do cupom a ser deletado
          schema:
            type: string
            example: MY_COUPON
      responses:
        '200':
          description: Cupom deletado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CouponResponse'
                  error:
                    type: string
                    nullable: true
                    example: null
                  success:
                    $ref: '#/components/schemas/Success'
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: >-
                      Mensagem de erro descrevendo o motivo da falha na
                      autenticação.
                    example: Token de autenticação inválido ou ausente.
        '404':
          description: Cupom não encontrado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro indicando que o cupom não foi encontrado.
                    example: Cupom não encontrado.
  /coupons/toggle:
    post:
      summary: Alternar status de um cupom
      description: |
        Alterna o status de um cupom entre ativo e inativo.

        Use essa rota para ativar ou desativar um cupom sem precisar deletá-lo.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          description: Identificador único do cupom
          schema:
            type: string
            example: MY_COUPON
      responses:
        '200':
          description: Status do cupom alternado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CouponResponse'
                  error:
                    type: string
                    nullable: true
                    example: null
                  success:
                    $ref: '#/components/schemas/Success'
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: >-
                      Mensagem de erro descrevendo o motivo da falha na
                      autenticação.
                    example: Token de autenticação inválido ou ausente.
        '404':
          description: Cupom não encontrado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro indicando que o cupom não foi encontrado.
                    example: Cupom não encontrado.
  /products/create:
    post:
      summary: Criar um produto
      description: >
        Permite que você crie um novo produto que pode ser usado em cobranças.

        Produtos podem ser avulsos (pagamento único) ou de assinatura; use o
        campo opcional `cycle` para definir a recorrência (`WEEKLY`, `MONTHLY`,
        `SEMIANNUALLY`, `ANNUALLY`). Quando `cycle` é omitido ou `null`, o
        produto é avulso.


        **Alternativa**: Você também pode criar e gerenciar seus produtos pelo
        [Dashboard da AbacatePay](https://app.abacatepay.com/produtos).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Dados necessários para criar um produto.
              required:
                - externalId
                - name
                - price
                - currency
              additionalProperties: false
              example:
                externalId: prod-123
                name: Produto Exemplo
                price: 10000
                currency: BRL
              properties:
                externalId:
                  type: string
                  description: Identificador único do produto no seu sistema.
                  example: prod-123
                name:
                  type: string
                  description: Nome do produto.
                  example: Produto Exemplo
                price:
                  type: number
                  description: Preço do produto em centavos.
                  minimum: 1
                  example: 10000
                currency:
                  type: string
                  description: Moeda do produto.
                  default: BRL
                  example: BRL
                description:
                  type: string
                  description: Descrição opcional do produto.
                  example: Descrição do produto
                  x-mint:
                    hidden: true
                imageUrl:
                  type: string
                  format: uri
                  nullable: true
                  description: URL da imagem do produto. Opcional.
                  example: null
                cycle:
                  type: string
                  nullable: true
                  description: >
                    Opcional. Indica se o produto é uma assinatura. Quando omitido
                    ou `null`, o produto é avulso (pagamento único).

                    Valores possíveis: `WEEKLY`, `MONTHLY`, `SEMIANNUALLY`,
                    `ANNUALLY`.
                  enum:
                    - WEEKLY
                    - MONTHLY
                    - SEMIANNUALLY
                    - ANNUALLY
                  example: null
      responses:
        '200':
          description: Produto criado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Product'
                  error:
                    type: string
                    nullable: true
                    example: null
                  success:
                    $ref: '#/components/schemas/Success'
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: >-
                      Mensagem de erro descrevendo o motivo da falha na
                      autenticação.
                    example: Token de autenticação inválido ou ausente.
  /products/list:
    get:
      summary: Listar produtos
      description: >
        Retorna todos os produtos que você criou com suporte a paginação.


        Você pode usar essa rota para visualizar todos os seus produtos,
        incluindo status, preços, ciclo de assinatura (quando aplicável) e
        demais informações.


        **Alternativa**: Você também pode visualizar e gerenciar seus produtos
        pelo [Dashboard da AbacatePay](https://app.abacatepay.com/produtos).
      security:
        - bearerAuth: []
      parameters:
        - name: after
          in: query
          description: Cursor para buscar itens após este ponto
          required: false
          schema:
            type: string
        - name: before
          in: query
          description: Cursor para buscar itens antes deste ponto
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: Quantidade de itens por página (1-100)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
            example: 100
        - name: id
          in: query
          description: Filtrar por identificador único do produto
          required: false
          schema:
            type: string
            example: prod_abc123xyz
        - name: externalId
          in: query
          description: Filtrar por identificador do produto no seu sistema
          required: false
          schema:
            type: string
            example: prod-123
        - name: status
          in: query
          description: Filtrar por status do produto
          required: false
          schema:
            type: string
            enum:
              - ACTIVE
              - INACTIVE
      responses:
        '200':
          description: Lista de produtos retornada com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: Lista de produtos.
                    items:
                      $ref: '#/components/schemas/Product'
                  success:
                    $ref: '#/components/schemas/Success'
                  error:
                    type: string
                    nullable: true
                    example: null
                  pagination:
                    $ref: '#/components/schemas/PaginationCursor'
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: >-
                      Mensagem de erro descrevendo o motivo da falha na
                      autenticação.
                    example: Token de autenticação inválido ou ausente.
  /products/get:
    get:
      summary: Buscar um produto
      description: >
        Retorna os dados de um produto específico baseado em filtros, incluindo
        o campo `cycle` (assinatura ou avulso).


        Você pode usar essa rota para buscar um produto por ID ou externalId.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          description: Identificador único público do produto
          required: false
          schema:
            type: string
            example: prod_abc123xyz
        - name: externalId
          in: query
          description: Identificador único do produto no seu sistema
          required: false
          schema:
            type: string
            example: prod-123
      responses:
        '200':
          description: Produto encontrado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Product'
                  error:
                    type: string
                    nullable: true
                    example: null
                  success:
                    $ref: '#/components/schemas/Success'
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: >-
                      Mensagem de erro descrevendo o motivo da falha na
                      autenticação.
                    example: Token de autenticação inválido ou ausente.
        '404':
          description: Produto não encontrado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: >-
                      Mensagem de erro indicando que o produto não foi
                      encontrado.
                    example: Produto não encontrado.
  /products/delete:
    post:
      summary: Deletar um produto
      description: |
        Remove um produto da sua loja (avulso ou de assinatura).

        Esta operação é irreversível. Use com cuidado.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          description: Identificador único público do produto a ser deletado
          schema:
            type: string
            example: prod_abc123xyz
      responses:
        '200':
          description: Produto deletado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Product'
                  error:
                    type: string
                    nullable: true
                    example: null
                  success:
                    $ref: '#/components/schemas/Success'
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: >-
                      Mensagem de erro descrevendo o motivo da falha na
                      autenticação.
                    example: Token de autenticação inválido ou ausente.
        '404':
          description: Produto não encontrado.
          content:
            application/json:
              schema:
                type: object
