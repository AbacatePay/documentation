openapi: 3.1.0
info:
  title: API AbacatePay
  description: API para gerenciamento de cobranças e pagamentos usando o AbacatePay.
  version: 1.0.0
servers:
  - url: https://api.abacatepay.com/v1
    description: Único servidor para os ambientes de produção e sandbox.
paths:
  /customers/create:
    post:
      summary: Criar um novo cliente
      description: |
        Permite que você crie um novo cliente para a sua loja.
        
        **Campo obrigatório**: Apenas o `email` é obrigatório para criar um cliente.
        
        **Recomendado**: Embora os demais campos sejam opcionais, é altamente recomendado fornecer `name`, `cellphone`, `taxId` e `zipCode` quando disponíveis, pois essas informações melhoram a experiência do cliente no checkout e facilitam a identificação.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: |
                Os dados do seu cliente.
                
                **Obrigatório**: Apenas `email` é obrigatório.
                
                **Opcional mas recomendado**: `name`, `cellphone`, `taxId`, `zipCode` e `metadata` são opcionais, mas recomendados para melhor experiência do cliente.
              required: ['email']
              additionalProperties: false
              example:
                email: daniel_lima@abacatepay.com
              properties:
                email:
                  type: string
                  description: E-mail do cliente (obrigatório)
                  example: daniel_lima@abacatepay.com
                name:
                  type: string
                  description: Nome completo do seu cliente (opcional)
                  example: Daniel Lima
                  x-mint:
                    hidden: true
                cellphone:
                  type: string
                  description: Celular do cliente (opcional)
                  example: (11) 4002-8922
                  x-mint:
                    hidden: true
                taxId:
                  type: string
                  description: CPF ou CNPJ válido do cliente (opcional)
                  example: 123.456.789-01
                  x-mint:
                    hidden: true
                zipCode:
                  type: string
                  description: CEP do cliente (opcional)
                  example: '01310-100'
                  x-mint:
                    hidden: true
                metadata:
                  type: object
                  description: Metadados adicionais do cliente. Campo livre para a sua aplicação (opcional)
                  additionalProperties: true
                  example:
                    source: 'landing-page'
                    campaign: 'black-friday-2025'
                  x-mint:
                    hidden: true
      responses:
        '200':
          description: Cliente criado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: Dados do cliente criado.
                    properties:
                      id:
                        type: string
                        description: Identificador único público do cliente
                        example: 'cust_abc123xyz'
                      devMode:
                        type: boolean
                        description: Indica se o cliente foi criado em ambiente de testes.
                        example: false
                      email:
                        type: string
                        description: E-mail do cliente
                        example: 'customer@example.com'
                        required: true
                      taxId:
                        type: string
                        description: CPF ou CNPJ do cliente
                        example: '12345678900'
                      country:
                        type: string
                        description: País do cliente
                        example: 'BR'
                      name:
                        type: string
                        description: Nome completo do cliente
                        example: 'João Silva'
                      cellphone:
                        type: string
                        description: Celular do cliente
                        example: '+5511999999999'
                      zipCode:
                        type: string
                        description: CEP do cliente
                        example: '01310-100'
                      metadata:
                        type: object
                        description: Metadados adicionais do cliente
                        additionalProperties: true
                        example:
                          customField: 'value'
                    additionalProperties: false
                  error:
                    type: string
                    nullable: true
                    example: null
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro descrevendo o motivo da falha na autenticação.
                    example: 'Token de autenticação inválido ou ausente.'
  /customers/list:
    get:
      summary: Listar clientes
      description: |
        Retorna todos os clientes que você cadastrou com suporte a paginação.
        
        Você pode usar essa rota para visualizar todos os seus clientes e suas informações.
        
        **Alternativa**: Você também pode visualizar e gerenciar seus clientes pelo [Dashboard da AbacatePay](https://www.abacatepay.com/app/clientes).
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Número da página (começa em 1)
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          description: Quantidade de itens por página
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
      responses:
        '200':
          description: Lista de clientes retornada com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: Lista de clientes.
                    items:
                      type: object
                      description: Dados do cliente.
                    properties:
                      id:
                        type: string
                        description: Identificador único público do cliente
                        example: 'cust_aebxkhDZNaMmJeKsy0AHS0FQ'
                      devMode:
                        type: boolean
                        description: Indica se o cliente foi criado em ambiente de testes.
                        example: true
                      name:
                        type: string
                        description: Nome completo do cliente
                        example: Daniel Lima
                      cellphone:
                        type: string
                        description: Celular do cliente
                        example: '(11) 4002-8922'
                      email:
                        type: string
                        description: E-mail do cliente
                        example: daniel_lima@abacatepay.com
                      taxId:
                        type: string
                        description: CPF ou CNPJ do cliente
                        example: '123.456.789-01'
                      metadata:
                        type: object
                        description: Metadados adicionais do cliente
                        additionalProperties: true
                        example:
                          source: 'landing-page'
                          campaign: 'black-friday-2025'
                      required:
                        - id
                        - devMode
                        - name
                        - cellphone
                        - email
                        - taxId
                      additionalProperties: false
                  pagination:
                    type: object
                    description: Informações de paginação
                    properties:
                      page:
                        type: integer
                        description: Página atual
                        example: 1
                      limit:
                        type: integer
                        description: Quantidade de itens por página
                        example: 20
                      total:
                        type: integer
                        description: Total de itens
                        example: 150
                      totalPages:
                        type: integer
                        description: Total de páginas
                        example: 8
                    required: ['page', 'limit', 'total', 'totalPages']
                    additionalProperties: false
                  error:
                    type: 'string'
                    example: null
                    nullable: true
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro descrevendo o motivo da falha na autenticação.
                    example: 'Token de autenticação inválido ou ausente.'
  /customers/get:
    get:
      summary: Buscar um cliente
      description: |
        Retorna os dados de um cliente específico baseado em filtros.
        
        Você pode usar essa rota para buscar um cliente por ID ou outros critérios.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          description: Identificador único público do cliente
          required: false
          schema:
            type: string
            example: 'cust_aebxkhDZNaMmJeKsy0AHS0FQ'
      responses:
        '200':
          description: Cliente encontrado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                      type: object
                      description: Dados do cliente.
                      properties:
                        id:
                          type: string
                          description: Identificador único público do cliente
                          example: 'cust_aebxkhDZNaMmJeKsy0AHS0FQ'
                        devMode:
                          type: boolean
                          description: Indica se o cliente foi criado em ambiente de testes.
                          example: true
                        name:
                          type: string
                          description: Nome completo do cliente
                          example: Daniel Lima
                        cellphone:
                          type: string
                          description: Celular do cliente
                          example: '(11) 4002-8922'
                        email:
                          type: string
                          description: E-mail do cliente
                          example: daniel_lima@abacatepay.com
                        taxId:
                          type: string
                          description: CPF ou CNPJ do cliente
                          example: '123.456.789-01'
                        metadata:
                          type: object
                          description: Metadados adicionais do cliente
                          additionalProperties: true
                          example:
                            source: 'landing-page'
                            campaign: 'black-friday-2025'
                      required: ['id', 'devMode', 'name', 'cellphone', 'email', 'taxId']
                      additionalProperties: false
                  error:
                    type: 'string'
                    example: null
                    nullable: true
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro descrevendo o motivo da falha na autenticação.
                    example: 'Token de autenticação inválido ou ausente.'
        '404':
          description: Cliente não encontrado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro indicando que o cliente não foi encontrado.
                    example: 'Cliente não encontrado.'
  /customers/delete:
    delete:
      summary: Deletar um cliente
      description: |
        Remove um cliente da sua loja.
        
        Esta operação é irreversível. Use com cuidado.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Dados para identificar o cliente a ser deletado.
              required: ['id']
              additionalProperties: false
              properties:
                id:
                  type: string
                  description: Identificador único público do cliente a ser deletado
                  example: 'cust_aebxkhDZNaMmJeKsy0AHS0FQ'
      responses:
        '200':
          description: Cliente deletado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: Dados do cliente deletado.
                    properties:
                      id:
                        type: string
                        description: Identificador único público do cliente
                        example: 'cust_aebxkhDZNaMmJeKsy0AHS0FQ'
                      devMode:
                        type: boolean
                        description: Indica se o cliente foi criado em ambiente de testes.
                        example: true
                      name:
                        type: string
                        description: Nome completo do cliente
                        example: Daniel Lima
                      cellphone:
                        type: string
                        description: Celular do cliente
                        example: '(11) 4002-8922'
                      email:
                        type: string
                        description: E-mail do cliente
                        example: daniel_lima@abacatepay.com
                      taxId:
                        type: string
                        description: CPF ou CNPJ do cliente
                        example: '123.456.789-01'
                      metadata:
                        type: object
                        description: Metadados adicionais do cliente
                        additionalProperties: true
                        example:
                          source: 'landing-page'
                          campaign: 'black-friday-2025'
                    required: ['id', 'devMode', 'name', 'cellphone', 'email', 'taxId']
                    additionalProperties: false
                  error:
                    type: 'string'
                    example: null
                    nullable: true
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro descrevendo o motivo da falha na autenticação.
                    example: 'Token de autenticação inválido ou ausente.'
        '404':
          description: Cliente não encontrado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro indicando que o cliente não foi encontrado.
                    example: 'Cliente não encontrado.'
  /coupons/create:
    post:
      summary: Criar um novo cupom
      description: |
        Permite que você crie um novo cupom que pode ser usado por seus clientes para aplicar descontos.
        
        **Alternativa**: Você também pode criar e gerenciar seus cupons pelo [Dashboard da AbacatePay](https://www.abacatepay.com/app/cupons).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
                  $ref: '#/components/schemas/Coupon'
      responses:
        '200':
          description: Cupom criado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CouponResponse'
                  error:
                    type: 'string'
                    nullable: true
                    example: null
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro descrevendo o motivo da falha na autenticação.
                    example: 'Token de autenticação inválido ou ausente.'
  /coupons/list:
    get:
      summary: Listar cupons
      description: |
        Retorna todos os cupons que você criou com suporte a paginação.
        
        Você pode usar essa rota para visualizar todos os seus cupons, incluindo seus status (ativos, inativos ou expirados), descontos aplicados e quantas vezes foram utilizados.
        
        **Alternativa**: Você também pode visualizar e gerenciar seus cupons pelo [Dashboard da AbacatePay](https://www.abacatepay.com/app/cupons).
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Número da página (começa em 1)
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          description: Quantidade de itens por página
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
      responses:
        '200':
          description: Lista de cupons retornada com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: Lista de cupons.
                    items:
                      $ref: '#/components/schemas/CouponResponse'
                  pagination:
                    type: object
                    description: Informações de paginação
                    properties:
                      page:
                        type: integer
                        description: Página atual
                        example: 1
                      limit:
                        type: integer
                        description: Quantidade de itens por página
                        example: 20
                      total:
                        type: integer
                        description: Total de itens
                        example: 150
                      totalPages:
                        type: integer
                        description: Total de páginas
                        example: 8
                    required: ['page', 'limit', 'total', 'totalPages']
                    additionalProperties: false
                  error:
                    type: 'string'
                    nullable: true
                    example: null
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro descrevendo o motivo da falha na autenticação.
                    example: 'Token de autenticação inválido ou ausente.'
  /coupons/get:
    get:
      summary: Buscar um cupom
      description: |
        Retorna os dados de um cupom específico baseado em filtros.
        
        Você pode usar essa rota para buscar um cupom por ID ou outros critérios.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          description: Identificador único do cupom
          required: false
          schema:
            type: string
            example: 'MY_COUPON'
      responses:
        '200':
          description: Cupom encontrado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CouponResponse'
                  error:
                    type: 'string'
                    nullable: true
                    example: null
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro descrevendo o motivo da falha na autenticação.
                    example: 'Token de autenticação inválido ou ausente.'
        '404':
          description: Cupom não encontrado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro indicando que o cupom não foi encontrado.
                    example: 'Cupom não encontrado.'
  /coupons/delete:
    delete:
      summary: Deletar um cupom
      description: |
        Remove um cupom da sua loja.
        
        Esta operação é irreversível. Use com cuidado.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Dados para identificar o cupom a ser deletado.
              required: ['id']
              additionalProperties: false
              properties:
                id:
                  type: string
                  description: Identificador único do cupom a ser deletado
                  example: 'MY_COUPON'
      responses:
        '200':
          description: Cupom deletado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CouponResponse'
                  error:
                    type: 'string'
                    nullable: true
                    example: null
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro descrevendo o motivo da falha na autenticação.
                    example: 'Token de autenticação inválido ou ausente.'
        '404':
          description: Cupom não encontrado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro indicando que o cupom não foi encontrado.
                    example: 'Cupom não encontrado.'
  /coupons/toggle:
    patch:
      summary: Alternar status de um cupom
      description: |
        Alterna o status de um cupom entre ativo e inativo.
        
        Use essa rota para ativar ou desativar um cupom sem precisar deletá-lo.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Dados para identificar o cupom a ser alternado.
              required: ['id']
              additionalProperties: false
              properties:
                id:
                  type: string
                  description: Identificador único do cupom
                  example: 'MY_COUPON'
      responses:
        '200':
          description: Status do cupom alternado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CouponResponse'
                  error:
                    type: 'string'
                    nullable: true
                    example: null
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro descrevendo o motivo da falha na autenticação.
                    example: 'Token de autenticação inválido ou ausente.'
        '404':
          description: Cupom não encontrado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro indicando que o cupom não foi encontrado.
                    example: 'Cupom não encontrado.'
  /checkouts/create:
    post:
      summary: Criar uma cobrança com nosso Checkout
      description: Cria uma cobrança com checkout integrado e retorna a URL para o cliente concluir o pagamento.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              additionalProperties: false
              example:
                items:
                  - id: prod-1234
                    quantity: 2
              properties:
                items:
                  type: array
                  description: |
                    Lista de itens incluídos na cobrança.
                    Este é o único campo obrigatório — o valor total é calculado a partir destes itens.
                  minItems: 1
                  items:
                    type: object
                    additionalProperties: false
                    required: [id, quantity]
                    properties:
                      id:
                        type: string
                        description: ID público do produto na sua loja.
                        example: prod-1234
                      quantity:
                        type: integer
                        description: Quantidade deste item.
                        minimum: 1
                        example: 2
                method:
                  type: string
                  description: Método de pagamento disponível.
                  enum: ['PIX', 'CARD']
                  x-mint:
                    hidden: true
                returnUrl:
                  type: string
                  format: uri
                  description: URL para onde o cliente será redirecionado ao clicar em "Voltar" no checkout.
                  x-mint:
                    hidden: true
                completionUrl:
                  type: string
                  format: uri
                  description: URL para onde o cliente será redirecionado após o pagamento ser concluído.
                  x-mint:
                    hidden: true
                customerId:
                  type: string
                  description: |
                    ID de um cliente já cadastrado na sua loja.
                    Se informado, o checkout será pré-preenchido com os dados deste cliente.
                    
                    **Exemplo**: `"cust_abcdefghij"`
                  x-mint:
                    hidden: true
                customer:
                  type: object
                  description: |
                    Dados do cliente. Se o cliente ainda não existir, será criado automaticamente.
                    Opcional quando `customerId` for usado.
                    
                    **Importante**: O objeto `customer` não é obrigatório, mas ao informar qualquer campo do `customer`, todos os campos (`name`, `cellphone`, `email` e `taxId`) se tornam obrigatórios.
                  additionalProperties: false
                  required: [name, cellphone, email, taxId]
                  x-mint:
                    hidden: true
                  properties:
                    name:
                      type: string
                      description: |
                        Nome completo do cliente.
                        
                        **Exemplo**: `"Daniel Lima"`
                    cellphone:
                      type: string
                      description: |
                        Celular do cliente.
                        
                        **Exemplo**: `"11 4002-8922"`
                    email:
                      type: string
                      description: |
                        E-mail do cliente.
                        
                        **Exemplo**: `"daniel_lima@abacatepay.com"`
                    taxId:
                      type: string
                      description: |
                        CPF ou CNPJ do cliente.
                        
                        **Exemplo**: `"123.456.789-01"`
                coupons:
                  type: array
                  description: |
                    Lista de cupons que podem ser utilizados nesta cobrança.
                    
                    **Exemplo**: `["ABKT10", "ABKT5", "PROMO10"]`
                  items:
                    type: string
                  maxItems: 50
                  x-mint:
                    hidden: true

                externalId:
                  type: string
                  description: |
                    ID da cobrança no seu sistema, caso queira manter uma referência própria.
                    
                    **Exemplo**: `"seu_id_123"`
                  x-mint:
                    hidden: true

                metadata:
                  type: object
                  description: |
                    Metadados adicionais da cobrança. Campo livre para a sua aplicação.
                    
                    **Exemplo**:
                    ```json
                    {
                      "source": "landing-page-black-friday",
                      "campaign": "BF-2025"
                    }
                    ```
                  additionalProperties: true
                  x-mint:
                    hidden: true
      responses:
        "200":
          description: Cobrança criada com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Billing"
                  error:
                    type: "string"
                    nullable: true
                    example: null
        "401":
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Motivo da falha na autenticação.
                    example: Token de autenticação inválido ou ausente.
  /checkouts/get:
    get:
      summary: Buscar uma cobrança
      description: |
        Retorna os dados de uma cobrança específica usando o ID.
        
        Você pode usar essa rota para buscar uma cobrança por ID e visualizar seus detalhes, status e informações relacionadas.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: query
          description: Identificador único da cobrança
          required: true
          schema:
            type: string
            example: 'bill_abc123xyz'
      responses:
        '200':
          description: Cobrança encontrada com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
