  /public-mrr/revenue:
    get:
      summary: Obter receita por período
      description: Retorna a receita total, total de transações e transações por dia em um período específico. Os dados são cacheados por 1 hora (3600 segundos) para melhor performance. A data de fim deve ser posterior à data de início.
      security:
        - bearerAuth: []
      parameters:
        - name: startDate
          in: query
          required: true
          description: Data de início do período (formato YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: '2024-01-01'
        - name: endDate
          in: query
          required: true
          description: Data de fim do período (formato YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: '2024-01-31'
      responses:
        '200':
          description: Dados de receita retornados com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      totalRevenue:
                        type: number
                        description: Receita total do período em centavos
                        example: 150000
                      totalTransactions:
                        type: integer
                        description: Total de transações no período
                        example: 45
                      transactionsPerDay:
                        type: object
                        description: Objeto com transações agrupadas por dia (chave é a data no formato YYYY-MM-DD)
                        additionalProperties:
                          type: object
                          properties:
                            amount:
                              type: number
                              description: Valor total das transações do dia em centavos
                              example: 5000
                            count:
                              type: integer
                              description: Quantidade de transações do dia
                              example: 3
                          required: ['amount', 'count']
                          additionalProperties: false
                        example:
                          '2024-01-15':
                            amount: 5000
                            count: 3
                          '2024-01-16':
                            amount: 3000
                            count: 2
                    required: ['totalRevenue', 'totalTransactions', 'transactionsPerDay']
                    additionalProperties: false
                  error:
                    type: string
                    nullable: true
                    example: null
        '400':
          description: Erro de validação. Parâmetros inválidos ou ausentes.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro descrevendo o problema de validação.
                    example: 'Start date and end date are required'
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro descrevendo o motivo da falha na autenticação.
                    example: 'Token de autenticação inválido ou ausente.'
components:
  schemas:
    Customer:
      type: object
      description: Os dados do seu cliente.
      required: ['id', 'devMode', 'name', 'cellphone', 'email', 'taxId']
      additionalProperties: false
      properties:
        id:
          type: string
          description: Identificador único público do cliente
          example: 'cust_aebxkhDZNaMmJeKsy0AHS0FQ'
        devMode:
          type: boolean
          description: Indica se o cliente foi criado em ambiente de testes.
          example: true
        name:
          type: string
          description: Nome completo do cliente
          example: Daniel Lima
        cellphone:
          type: string
          description: Celular do cliente
          example: '(11) 4002-8922'
        email:
          type: string
          description: E-mail do cliente
          example: daniel_lima@abacatepay.com
        taxId:
          type: string
          description: CPF ou CNPJ do cliente
          example: '123.456.789-01'
        metadata:
          type: object
          description: Metadados adicionais do cliente
          additionalProperties: true
          example:
            source: 'landing-page'
            campaign: 'black-friday-2025'
    Coupon:
      type: object
      description: Os dados do seu cupom.
      required: ['code', 'discount', 'discountKind']
      additionalProperties: false
      properties:
        code:
          type: string
          description: Identificador único do cupom
          example: DEYVIN_20
        notes:
          type: string
          description: Descrição sbre o cupom
          example: Cupom de desconto pro meu público
        maxRedeems:
          type: number
          description: Quantidade de vezes em que o cupom pode ser resgatado. -1 Significa que esse cupom pode ser resgatado sem limites
          example: 10
          default: -1
        discountKind:
          type: string
          description: Tipo de desconto aplicado, porcentagem ou fixo
          enum: ['PERCENTAGE', 'FIXED']
        discount:
          type: number
          description: Valor de desconto a ser aplicado
        metadata:
          type: object
          description: Objeto chave valor para metadados do cupom
          default: {}
    CouponResponse:
      type: object
      description: Os dados do seu cupom.
      required: ['id', 'discount', 'discountKind', 'status', 'createdAt', 'updatedAt']
      additionalProperties: false
      properties:
        id:
          type: string
          description: Identificador único do cupom
          example: DEYVIN_20
        notes:
          type: string
          description: Descrição sobre o cupom
          example: Cupom de desconto pro meu público
        maxRedeems:
          type: integer
          description: Quantidade de vezes em que o cupom pode ser resgatado. -1 significa ilimitado.
          example: -1
          default: 10
        redeemsCount:
          type: integer
          description: Quantidade de vezes que o cupom já foi resgatado.
          example: 0
        discountKind:
          type: string
          description: Tipo de desconto aplicado, porcentagem ou fixo
          enum: ['PERCENTAGE', 'FIXED']
          example: PERCENTAGE
        discount:
          type: number
          description: Valor de desconto a ser aplicado
          example: 123
        devMode:
          type: boolean
          description: Indica se o cupom foi criado em ambiente de testes.
          example: true
        status:
          type: string
          description: Status atual do cupom.
          enum: ['ACTIVE', 'INACTIVE', 'EXPIRED']
          example: ACTIVE
        createdAt:
          type: string
          format: date-time
          description: Data de criação do cupom.
          example: '2025-05-25T23:43:25.250Z'
        updatedAt:
          type: string
          format: date-time
          description: Data de atualização do cupom.
          example: '2025-05-25T23:43:25.250Z'
        metadata:
          type: object
          description: Objeto chave valor para metadados do cupom
          default: {}

    Billing:
      type: object
      properties:
        id:
          type: string
          description: Identificador único da cobrança.
          example: 'bill_abc123xyz'
        externalId:
          type: string
          nullable: true
          description: ID da cobrança no seu sistema.
          example: 'pedido-123'
        url:
          type: string
          format: uri
          description: URL onde o usuário pode concluir o pagamento.
          example: 'https://app.abacatepay.com/pay/bill_abc123xyz'
        amount:
          type: number
          description: Valor total a ser pago em centavos.
          example: 10000
        paidAmount:
          type: number
          nullable: true
          description: Valor já pago em centavos. Null se ainda não foi pago.
          example: null
        items:
          type: array
          description: Lista de itens na cobrança.
          items:
            type: object
            properties:
              id:
                type: string
                description: ID do produto.
                example: 'prod_456'
              quantity:
                type: integer
                description: Quantidade do item.
                example: 2
        status:
          type: string
          description: Status atual da cobrança.
          enum: ['PENDING', 'EXPIRED', 'CANCELLED', 'PAID', 'REFUNDED']
          example: 'PENDING'
        coupons: 
          type: array
          description: Lista de cupons aplicados na cobrança.
          items:
            type: string
          example: []
        devMode:
          type: boolean
          description: Indica se a cobrança foi criada em ambiente de testes.
          example: false
        customerId:
          type: string
          nullable: true
          description: ID do cliente associado à cobrança.
          example: null
        returnUrl:
          type: string
          format: uri
          nullable: true
          description: URL para onde o cliente será redirecionado ao clicar em "Voltar".
          example: null
        completionUrl:
          type: string
          format: uri
          nullable: true
          description: URL para onde o cliente será redirecionado após o pagamento.
          example: null
        receiptUrl:
          type: string
          format: uri
          nullable: true
          description: URL do comprovante de pagamento.
          example: null
        metadata:
          type: object
          description: Metadados adicionais da cobrança.
          additionalProperties: true
          example: {}
        createdAt:
          type: string
          format: date-time
          description: Data e hora de criação da cobrança.
          example: '2024-11-04T18:38:28.573Z'
        updatedAt:
          type: string
          format: date-time
          description: Data e hora da última atualização da cobrança.
          example: '2024-11-04T18:38:28.573Z'
    PixQRCode:
      type: object
      properties:
        id:
          type: string
          description: Identificador único do QRCode Pix.
          example: 'pix_char_123456'
        amount:
          type: number
          description: Valor a ser pago.
          example: 100
        status:
          type: string
          description: Informação sobre o andamento do QRCode Pix.
          enum: ['PENDING', 'EXPIRED', 'CANCELLED', 'PAID', 'REFUNDED']
          example: 'PENDING'
        devMode:
          type: boolean
          description: Ambiente no qual o QRCode Pix foi criado.
          example: true
        brCode:
          type: string
          description: Código copia-e-cola do QRCode Pix.
          example: '00020101021226950014br.gov.bcb.pix'
        brCodeBase64:
          type: string
          description: Imagem em Base64 do QRCode Pix.
          example: 'data:image/png;base64,iVBORw0KGgoAAA'
        platformFee:
          type: number
          description: Taxas da plataforma
          example: 80
        createdAt:
          type: string
          description: Data de criação do QRCode Pix.
          example: '2025-03-24T21:50:20.772Z'
        updatedAt:
          type: string
          description: Data de atualização do QRCode Pix.
          example: '2025-03-24T21:50:20.772Z'
        expiresAt:
          type: string
          description: Data de expiração do QRCode Pix
          example: '2025-03-25T21:50:20.772Z'
    Transaction:
      type: object
      description: Dados de uma transação (pagamento ou saque).
      properties:
        id:
          type: string
          description: Identificador único da transação.
          example: 'tran_123456'
        status:
          type: string
          description: Status atual da transação.
          enum: ['PENDING', 'EXPIRED', 'CANCELLED', 'COMPLETE', 'REFUNDED']
          example: 'PENDING'
        devMode:
          type: boolean
          description: Indica se a transação foi criada em ambiente de testes.
          example: true
        receiptUrl:
          type: string
          format: uri
          description: URL do comprovante da transação.
          example: 'https://abacatepay.com/receipt/tran_123456'
        kind:
          type: string
          description: Tipo da transação.
          enum: ['PAYMENT', 'WITHDRAW']
          example: 'WITHDRAW'
          default: 'WITHDRAW'
        amount:
          type: number
          description: Valor da transação em centavos.
          example: 5000
        platformFee:
          type: number
          description: Taxa da plataforma em centavos.
          example: 80
        externalId:
          type: string
          description: Identificador externo da transação.
          example: 'withdraw-1234'
        createdAt:
          type: string
          format: date-time
          description: Data de criação da transação.
          example: '2025-03-24T21:50:20.772Z'
        updatedAt:
          type: string
          format: date-time
          description: Data de atualização da transação.
          example: '2025-03-24T21:50:20.772Z'
      required:
        ['id', 'status', 'devMode', 'receiptUrl', 'kind', 'amount', 'platformFee', 'createdAt', 'updatedAt']
    Store:
      type: object
      description: Dados da loja/conta do usuário.
      required: ['id', 'name', 'balance']
      additionalProperties: false
      properties:
        id:
          type: string
          description: Identificador único da loja.
          example: 'store_abc123xyz'
        name:
          type: string
          description: Nome da loja.
          example: 'Minha Loja'
        balance:
          type: object
          description: Informações de saldo da loja.
          required: ['available', 'pending', 'blocked']
          additionalProperties: false
          properties:
            available:
              type: number
              description: Saldo disponível para saque em centavos.
              example: 50000
            pending:
              type: number
              description: Saldo pendente de confirmação em centavos.
              example: 10000
            blocked:
              type: number
              description: Saldo bloqueado em disputas em centavos.
              example: 0
    Frequency:
      type: object
      description: Configuração da frequência de cobrança da assinatura.
      required: ['cycle']
      additionalProperties: false
      properties:
        cycle:
          type: string
          description: Ciclo de cobrança da assinatura.
          enum: ['MONTHLY', 'YEARLY', 'WEEKLY', 'DAILY']
          example: 'MONTHLY'
        dayOfProcessing:
          type: integer
          description: Dia do mês em que a cobrança será processada (1-31).
          minimum: 1
          maximum: 31
          example: 5
    RetryPolicy:
      type: object
      description: Política de retentativa em caso de falha no pagamento.
      required: ['maxRetry', 'retryEvery']
      additionalProperties: false
      properties:
        maxRetry:
          type: integer
          description: Número máximo de tentativas de cobrança.
          minimum: 1
          maximum: 10
          example: 3
        retryEvery:
          type: integer
          description: Intervalo em dias entre tentativas de cobrança.
          minimum: 1
          maximum: 30
          example: 2
    SubscriptionEvent:
      type: object
      description: Evento relacionado à assinatura.
      required: ['event', 'description', 'createdAt']
      additionalProperties: false
      properties:
        event:
          type: string
          description: Tipo do evento.
          example: 'CREATED'
        description:
          type: string
          description: Descrição do evento.
          example: 'Subscription was created.'
        createdAt:
          type: string
          format: date-time
          description: Data de criação do evento.
          example: '2024-11-04T18:38:28.573Z'
    Subscription:
      type: object
      description: Dados de uma assinatura (subscription).
      required: ['id', 'externalId', 'name', 'description', 'amount', 'currency', 'method', 'status', 'frequency', 'customerId', 'devMode', 'events', 'createdAt', 'updatedAt']
      additionalProperties: false
      properties:
        id:
          type: string
          description: Identificador único da assinatura.
          example: 'subs_abc123xyz'
        externalId:
          type: string
          description: Identificador externo da assinatura.
          example: 'subs-123'
        name:
          type: string
          description: Nome da assinatura.
          example: 'Plano Premium Mensal'
        description:
          type: string
          description: Descrição da assinatura.
          example: 'Assinatura mensal do plano premium'
        amount:
          type: number
          description: Valor da assinatura em centavos.
          example: 10000
        currency:
          type: string
          description: Moeda da assinatura.
          example: 'BRL'
        method:
          type: string
          description: Método de pagamento da assinatura.
          enum: ['PIX', 'CARD']
          example: 'PIX'
        status:
          type: string
          description: Status atual da assinatura.
          enum: ['PENDING', 'ACTIVE', 'CANCELLED', 'EXPIRED', 'FAILED']
          example: 'PENDING'
        frequency:
          $ref: '#/components/schemas/Frequency'
        retryPolicy:
          oneOf:
            - $ref: '#/components/schemas/RetryPolicy'
            - type: 'null'
        customerId:
          type: string
          description: Identificador do cliente que possui a assinatura.
          example: 'cust_abc123xyz'
        devMode:
          type: boolean
          description: Indica se a assinatura foi criada em ambiente de testes.
          example: false
        events:
          type: array
          description: Lista de eventos relacionados à assinatura.
          items:
            $ref: '#/components/schemas/SubscriptionEvent'
        createdAt:
          type: string
          format: date-time
          description: Data de criação da assinatura.
          example: '2024-11-04T18:38:28.573Z'
        updatedAt:
          type: string
          format: date-time
          description: Data de atualização da assinatura.
          example: '2024-11-04T18:38:28.573Z'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Todas as requisições devem incluir sua chave de API no header Authorization usando o formato `Bearer <abacatepay-api-key>`. Sem esse header a requisição será rejeitada.
        
        Saiba mais sobre como criar e usar chaves de API na [documentação de autenticação](/pages/authentication).