      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              example:
                amount: 10000
              properties:
                amount:
                  type: number
                  description: Valor da cobrança em centavos.
                expiresIn:
                  type: number
                  description: Tempo de expiração da cobrança em segundos.
                  x-mint:
                    hidden: true
                description:
                  type: string
                  maxLength: 140
                  description: Mensagem que aparecerá na hora do pagamento do PIX.
                  x-mint:
                    hidden: true
                customer:
                  type: object
                  description: >
                    Os dados do seu cliente para criá-lo.

                    O objeto de customer não é obrigatório, mas ao informar
                    qualquer informação do `customer` todos os campos `name`,
                    `cellphone`, `email` e `taxId` são obrigatórios.
                  required:
                    - name
                    - cellphone
                    - email
                    - taxId
                  additionalProperties: false
                  x-mint:
                    hidden: true
                  properties:
                    name:
                      type: string
                      description: Nome completo do seu cliente
                      example: Daniel Lima
                    cellphone:
                      type: string
                      description: Celular do cliente
                      example: (11) 4002-8922
                    email:
                      type: string
                      description: E-mail do cliente
                      example: daniel_lima@abacatepay.com
                    taxId:
                      type: string
                      description: CPF ou CNPJ do cliente.
                      example: 123.456.789-01
                metadata:
                  type: object
                  description: Metadados opcionais para a cobrança
                  additionalProperties: true
                  x-mint:
                    hidden: true
              required:
