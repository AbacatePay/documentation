                    example: 'Token de autenticação inválido ou ausente.'
      parameters:
        - name: id
          in: query
          description: ID do QRCode Pix
          required: true
          schema:
            type: string
  /payouts/create:
    post:
      summary: Criar um novo payout
      description: |
        Permite que você crie um novo payout para transferir valores da sua conta AbacatePay.
        
        Você pode usar esta rota para:
        - **Realizar saques** da sua conta para sua própria chave PIX
        - **Enviar dinheiro** para outras contas
        - **Realizar pagamentos** diretamente pela API
        - **Efetuar transferências** para fornecedores, parceiros ou terceiros
        
        **Importante**: A chave PIX de destino não precisa ter a mesma titularidade do CNPJ da sua conta. Você pode realizar payouts para qualquer chave PIX válida.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Dados necessários para criar um payout.
              required: ['amount', 'externalId']
              additionalProperties: false
              example:
                amount: 10000
                externalId: 'saque-123'
              properties:
                amount:
                  type: number
                  description: Valor do payout em centavos.
                  minimum: 350
                  example: 10000
                description:
                  type: string
                  description: Descrição opcional do payout.
                  example: 'Saque para conta bancária'
                  x-mint:
                    hidden: true
                externalId:
                  type: string
                  description: Identificador único do payout em seu sistema.
                  example: 'saque-123'
      responses:
        '200':
          description: Payout criado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    description: Dados da transação de payout criada.
                    properties:
                      id:
                        type: string
                        description: Identificador único da transação.
                        example: 'txn_abc123xyz'
                      status:
                        type: string
                        description: Status atual da transação.
                        enum: ['PENDING', 'EXPIRED', 'CANCELLED', 'COMPLETE', 'REFUNDED']
                        example: 'PENDING'
                      devMode:
                        type: boolean
                        description: Indica se a transação foi criada em ambiente de testes.
                        example: false
                      receiptUrl:
                        type: string
                        format: uri
                        nullable: true
                        description: URL do comprovante da transação.
                        example: null
                      amount:
                        type: number
                        description: Valor da transação em centavos.
                        example: 10000
                      platformFee:
                        type: number
                        description: Taxa da plataforma em centavos.
                        example: 100
                      externalId:
                        type: string
                        description: Identificador externo da transação.
                        example: 'saque-123'
                      createdAt:
                        type: string
                        format: date-time
                        description: Data de criação da transação.
                        example: '2024-11-04T18:38:28.573Z'
                      updatedAt:
                        type: string
                        format: date-time
                        description: Data de atualização da transação.
                        example: '2024-11-04T18:38:28.573Z'
                  error:
                    type: string
                    nullable: true
                    example: null
        '401':
          description: Não autorizado. Falha na autenticação.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensagem de erro descrevendo o motivo da falha na autenticação.
                    example: 'Token de autenticação inválido ou ausente.'
  /payouts/get:
    get:
      summary: Buscar payout
      description: Permite que você recupere os detalhes de um payout específico usando o externalId.
      security:
        - bearerAuth: []
      parameters:
        - name: externalId
          in: query
          description: Identificador único do payout em seu sistema.
          required: true
